<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Employee</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container mt-5">

  <div class="card shadow p-4">

    <h2 class="text-center mb-4">
      Add Employee
    </h2>
    <!-- Success Message -->
    <div th:if="${success}"
         class="alert alert-success">

      <span th:text="${success}"></span>

    </div>

    <form th:action="@{/save}"
          th:object="${employee}"
          method="post">

      <!-- Name -->
      <div class="mb-3">

        <label class="form-label">
          Employee Name
        </label>

        <input type="text"
               th:field="*{name}"
               class="form-control"
               placeholder="Enter Employee Name"
               required>

      </div>

      <!-- Department -->
      <div class="mb-3">

        <label class="form-label">
          Department
        </label>

        <input type="text"
               th:field="*{department}"
               class="form-control"
               placeholder="Enter Department"
               required>

      </div>

      <!-- Salary -->
      <div class="mb-3">

        <label class="form-label">
          Salary
        </label>

        <input type="number"
               th:field="*{salary}"
               class="form-control"
               placeholder="Enter Salary"
               required>

      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="btn btn-success w-100">

        Save Employee

      </button>

    </form>

  </div>

</div>

</body>
</html>
