<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Employee</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-warning text-dark text-center">

                    <h2>
                        Edit Employee
                    </h2>

                </div>

                <div class="card-body p-4">

                    <!-- Edit Form -->
                    <form th:action="@{/save}"
                          th:object="${employee}"
                          method="post">

                        <!-- Hidden ID -->
                        <input type="hidden"
                               th:field="*{id}">

                        <!-- Employee Name -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Employee Name
                            </label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="Enter Employee Name"
                                   required>

                        </div>

                        <!-- Department -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Department
                            </label>

                            <input type="text"
                                   th:field="*{department}"
                                   class="form-control"
                                   placeholder="Enter Department"
                                   required>

                        </div>

                        <!-- Salary -->
                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Salary
                            </label>

                            <input type="number"
                                   th:field="*{salary}"
                                   class="form-control"
                                   placeholder="Enter Salary"
                                   required>

                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">

                            <!-- Back Button -->
                            <a href="/"
                               class="btn btn-secondary">

                                Back

                            </a>

                            <!-- Update Button -->
                            <button type="submit"
                                    class="btn btn-warning">

                                Update Employee

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
